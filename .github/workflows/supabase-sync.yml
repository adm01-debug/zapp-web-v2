name: Supabase Sync & Validate

on:
  push:
    paths:
      - 'supabase-export/**'
  pull_request:
    paths:
      - 'supabase-export/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Import and Validation
        env:
          DESTINO_URL: ${{ secrets.DESTINO_URL }}
        run: |
          if [ -z "$DESTINO_URL" ]; then
            echo "❌ DESTINO_URL secret is not set. Please configure it in GitHub Secrets."
            exit 1
          fi
          bash supabase-export/import.sh

      - name: Archive validation logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validation-logs
          path: |
            supabase-export/validation_result.json
            supabase-export/validation_log.csv
