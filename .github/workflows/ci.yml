# =================================================
# ZAPP-WEB CI/CD Pipeline
# =================================================
# Triggered on: push to main, pull requests
# Jobs: lint, typecheck, test, build, security
# O projeto usa Bun (bun.lock) — npm ci falharia sem package-lock.json
# =================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

jobs:
  # ===========================================
  # JOB 1: Lint & Type Check
  # ===========================================
  lint-and-typecheck:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: 📚 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: bun run lint

      - name: 🔎 Run TypeScript check
        run: bunx tsc -b --noEmit

  # ===========================================
  # JOB 2: Unit Tests
  # ===========================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: 📚 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run Vitest
        run: bun run test
        env:
          CI: true

  # ===========================================
  # JOB 3: Build
  # ===========================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: 📚 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build for production
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_EXTERNAL_SUPABASE_URL: ${{ secrets.VITE_EXTERNAL_SUPABASE_URL }}
          VITE_EXTERNAL_SUPABASE_ANON_KEY: ${{ secrets.VITE_EXTERNAL_SUPABASE_ANON_KEY }}

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: 📐 Report bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "====================="
          du -sh dist/
          echo ""
          echo "JS Files:"
          find dist -name "*.js" -exec du -h {} \;
          echo ""
          echo "CSS Files:"
          find dist -name "*.css" -exec du -h {} \;

  # ===========================================
  # JOB 4: Security Audit
  # ===========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: 🔒 Run dependency audit
        # Informativo: falha fica visível no job sem bloquear o pipeline
        # (vulnerabilidades transitivas sem fix não devem travar todos os PRs)
        continue-on-error: true
        run: bun audit

      - name: 🔍 Check for secrets in code
        run: |
          echo "Checking for potential secrets..."
          ! grep -rn "SUPABASE_SERVICE_ROLE_KEY\|sk_live_\|sk_test_\|password\s*=\s*[\"']" --include="*.ts" --include="*.tsx" --include="*.js" src/ || echo "⚠️ Potential secrets found - please review"
